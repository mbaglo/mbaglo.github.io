<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>
    <header>
      <div class="container">
        <h1 style="margin:0;">
          <a href="{{ '/' | relative_url }}" style="text-decoration:none; color:inherit;">{{ site.title }}</a>
        </h1>
        <p class="site-tagline">PhD Research • Embedded Systems • RIT</p>
        <nav>
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/about/' | relative_url }}">About</a>
          <a href="{{ '/blog/' | relative_url }}">Blog</a>
          <a href="{{ '/cv/' | relative_url }}">CV & Publications</a>
          <a href="{{ '/research/' | relative_url }}">Research</a>
        </nav>
      </div>
    </header>

    <div class="container">
      <main>
        {{ content }}
      </main>
    </div>

    <footer>
      <div class="container">
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }} &mdash; Academic website of Chinyere Gloria Mbaka</p>
      </div>
    </footer>
  </body>
</html>
